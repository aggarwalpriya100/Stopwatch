<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StopWatch</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="stopwatch">
        <h1 id="displayTime">00:00:00</h1>
        <div class="buttons">
            <img src="./images/stop.png" onclick="watchStop()" alt="Stop">
            <img src="./images/start.png" onclick="watchStart()" alt="Start">
            <img src="./images/reset.png" onclick="watchReset()" alt="Reset">
        </div>

    </div>
    <script src="script.js"></script>

</body>

</html>
